<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Config Center</title>
<style>
:root{--ink:#18211f;--muted:#718078;--line:#d7ddd8;--paper:#f5f7f4;--panel:#fff;--accent:#18795d;--danger:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px "SF Pro Text","PingFang SC",sans-serif}button,input,select,textarea{font:inherit}#login{min-height:100vh;display:grid;place-items:center}.login-card{width:min(390px,calc(100vw - 32px));padding:28px;background:var(--panel);border:1px solid var(--line);box-shadow:0 18px 50px #20332814}.mark{font:700 26px Georgia,serif;color:var(--accent);letter-spacing:0}.login-card p{color:var(--muted);margin:6px 0 24px}.field{display:grid;gap:7px;margin:13px 0}.field label{font-size:12px;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;padding:10px;border-radius:4px}textarea{min-height:360px;resize:vertical;font-family:"SFMono-Regular",Consolas,monospace;font-size:13px;line-height:1.6}button{border:0;border-radius:4px;padding:10px 14px;background:var(--accent);color:#fff;cursor:pointer}button.secondary{background:#edf1ee;color:var(--ink)}button.danger{background:var(--danger)}#app{display:none;min-height:100vh}.top{height:58px;background:#17372f;color:#fff;display:flex;align-items:center;padding:0 24px;justify-content:space-between}.top strong{font:700 20px Georgia,serif}.top span{font-size:12px;color:#c8d6d0}.layout{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 58px)}aside{border-right:1px solid var(--line);background:#fbfcfa;padding:18px}.aside-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.item{padding:11px 10px;border-bottom:1px solid #edf0ed;cursor:pointer}.item:hover,.item.active{background:#e6f1ec}.item b{display:block;font-weight:600}.item small{color:var(--muted)}main{padding:28px;max-width:1100px;width:100%}.title{display:flex;align-items:center;justify-content:space-between}.title h1{font:600 20px Georgia,serif;margin:0}.grid{display:grid;grid-template-columns:1fr 150px 160px;gap:12px;margin:18px 0}.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}.status{min-height:20px;color:var(--muted);margin-top:12px}.status.error{color:var(--danger)}.empty{color:var(--muted);padding:40px 0}.hidden{display:none!important}@media(max-width:760px){.layout{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line)}.grid{grid-template-columns:1fr}.top{padding:0 14px}main{padding:18px}}
</style>
</head>
<body>
<section id="login"><form class="login-card" id="loginForm"><div class="mark">Config Center</div><p>轻量配置管理</p><div class="field"><label>用户名</label><input name="username" value="admin" autocomplete="username" required></div><div class="field"><label>密码</label><input name="password" type="password" autocomplete="current-password" required></div><button type="submit">登录</button><div class="status" id="loginStatus"></div></form></section>
<section id="app"><header class="top"><strong>Config Center</strong><span id="who"></span><button class="secondary" id="logout">退出</button></header><div class="layout"><aside><div class="aside-head"><b>配置</b><button id="new">新建</button></div><div id="items"></div></aside><main><div class="title"><h1 id="heading">选择一项配置</h1><button class="secondary" id="history">历史版本</button></div><div id="editor" class="hidden"><div class="grid"><div class="field"><label>Data ID</label><input id="dataId"></div><div class="field"><label>Group</label><input id="group" value="DEFAULT_GROUP"></div><div class="field"><label>格式</label><select id="format"><option>php</option><option>json</option><option>yaml</option><option>yml</option><option>ini</option><option>txt</option></select></div></div><textarea id="content" spellcheck="false"></textarea><div class="actions"><button class="secondary" id="reload">重新读取</button><button id="publish">发布配置</button></div></div><div id="empty" class="empty">请选择配置，或创建一项新配置。</div><div class="status" id="status"></div></main></div></section>
<script>
const $=id=>document.getElementById(id);let token=localStorage.ccToken||'',current=null;
async function api(path,opt={}){opt.headers={...(opt.headers||{}),Authorization:'Bearer '+token};if(opt.body){opt.headers['Content-Type']='application/json';opt.body=JSON.stringify(opt.body)}let r=await fetch(path,opt),j=await r.json();if(!r.ok||j.code!==0)throw Error(j.message||'请求失败');return j.data}
function msg(text,error=false){let e=$('status');e.textContent=text;e.className='status '+(error?'error':'')}
async function load(){let rows=await api('/api/admin/v1/config');$('items').innerHTML=rows.map(x=>`<div class="item ${current&&current.dataId===x.dataId&&current.group===x.group?'active':''}" data-g="${encodeURIComponent(x.group)}" data-d="${encodeURIComponent(x.dataId)}"><b>${x.dataId}</b><small>${x.group} · r${x.revision} · ${x.format}</small></div>`).join('')||'<div class="empty">暂无配置</div>';document.querySelectorAll('.item').forEach(e=>e.onclick=()=>openItem(decodeURIComponent(e.dataset.g),decodeURIComponent(e.dataset.d)))}
async function openItem(group,dataId){let x=await api('/api/admin/v1/config/detail?group='+encodeURIComponent(group)+'&dataId='+encodeURIComponent(dataId));current=x;$('heading').textContent=x.dataId+' / '+x.group;$('dataId').value=x.dataId;$('group').value=x.group;$('format').value=x.format;$('content').value=x.content;$('editor').classList.remove('hidden');$('empty').classList.add('hidden');msg('当前版本 r'+x.revision);load()}
$('loginForm').onsubmit=async e=>{e.preventDefault();let f=new FormData(e.target);try{let r=await fetch('/api/admin/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(f))});let j=await r.json();if(!r.ok||j.code!==0)throw Error(j.message);token=j.data.token;localStorage.ccToken=token;$('who').textContent=j.data.username;$('login').style.display='none';$('app').style.display='block';load()}catch(x){$('loginStatus').textContent=x.message}};
$('new').onclick=()=>{current=null;$('heading').textContent='新建配置';$('dataId').value='';$('group').value='DEFAULT_GROUP';$('format').value='php';$('content').value='<?php\nreturn [\n];\n';$('editor').classList.remove('hidden');$('empty').classList.add('hidden');msg('')};$('publish').onclick=async()=>{try{let body={namespace:'public',dataId:$('dataId').value,group:$('group').value,format:$('format').value,content:$('content').value,expectedRevision:current?.revision};let r=await api('/api/admin/v1/config/publish',{method:'POST',body});msg('已发布 r'+r.revision);await openItem(body.group,body.dataId)}catch(x){msg(x.message,true)}};$('reload').onclick=()=>current&&openItem(current.group,current.dataId);$('logout').onclick=()=>{localStorage.removeItem('ccToken');location.reload()};$('history').onclick=async()=>{if(!current)return;let h=await api('/api/admin/v1/config/history?group='+encodeURIComponent(current.group)+'&dataId='+encodeURIComponent(current.dataId));alert(h.map(x=>'r'+x.revision+'  '+x.created_at+'  '+x.note).join('\n')||'暂无历史')};
</script></body></html>
