apiVersion: v1
kind: Namespace
metadata:
  name: config-center
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-center
  namespace: config-center
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-center
  namespace: config-center
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: config-center
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config-center
    spec:
      serviceAccountName: config-center
      containers:
        - name: server
          image: registry.example.com/yhs/config-center:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          envFrom:
            - secretRef:
                name: config-center-runtime
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: config-center
  namespace: config-center
spec:
  selector:
    app.kubernetes.io/name: config-center
  ports:
    - name: http
      port: 80
      targetPort: http

