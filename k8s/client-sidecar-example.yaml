# 将此片段合并到每个需要配置同步的业务 Deployment。
# image 必须是已经安装 yhs/webman-config-center 的业务镜像；APP_ROOT 按项目实际路径调整。
spec:
  template:
    spec:
      volumes:
        - name: config-cache
          emptyDir: {}
        - name: config-state
          emptyDir: {}
      initContainers:
        - name: config-center-init
          image: registry.example.com/yhs/your-app:replace-me
          workingDir: /app
          command: ["/bin/sh", "-ec"]
          args:
            - cp -a /app/config/nacos/. /config-cache/ 2>/dev/null || true; php vendor/bin/config-center-sync
          envFrom:
            - secretRef:
                name: config-center-client
          env:
            - name: CONFIG_CENTER_CONFIG_ROOT
              value: /config-cache
            - name: CONFIG_CENTER_STATE_DIR
              value: /app/runtime/config-center
          volumeMounts:
            - name: config-cache
              mountPath: /config-cache
            - name: config-state
              mountPath: /app/runtime/config-center
      containers:
        - name: app
          volumeMounts:
            - name: config-cache
              mountPath: /app/config/nacos
            - name: config-state
              mountPath: /app/runtime/config-center
        - name: config-center-listener
          image: registry.example.com/yhs/your-app:replace-me
          workingDir: /app
          command: ["php", "vendor/bin/config-center-listen"]
          envFrom:
            - secretRef:
                name: config-center-client
          env:
            - name: CONFIG_CENTER_CONFIG_ROOT
              value: /app/config/nacos
            - name: CONFIG_CENTER_STATE_DIR
              value: /app/runtime/config-center
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config-cache
              mountPath: /app/config/nacos
            - name: config-state
              mountPath: /app/runtime/config-center
        - name: config-center-poller
          image: registry.example.com/yhs/your-app:replace-me
          workingDir: /app
          command: ["php", "vendor/bin/config-center-poll"]
          envFrom:
            - secretRef:
                name: config-center-client
          env:
            - name: CONFIG_CENTER_CONFIG_ROOT
              value: /app/config/nacos
            - name: CONFIG_CENTER_STATE_DIR
              value: /app/runtime/config-center
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
          volumeMounts:
            - name: config-cache
              mountPath: /app/config/nacos
            - name: config-state
              mountPath: /app/runtime/config-center
